<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>专题页</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --subtext: #6b7280;
      --line: #e5e7eb;
      --accent: #ff6600;
      --accent-light: #fff3eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #fff9f5 100%);
      border: 1px solid rgba(255, 102, 0, 0.10);
      border-radius: 28px;
      padding: 26px 22px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .hero-tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .desc {
      margin-top: 10px;
      color: var(--subtext);
      line-height: 1.8;
      font-size: 15px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .item {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(17, 24, 39, 0.06);
      box-shadow: var(--shadow);
    }

    .item img {
      width: 100%;
      display: block;
      background: #fff;
    }

    .item-body {
      padding: 14px 16px 16px;
    }

    .item-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .item-sub {
      font-size: 13px;
      color: var(--subtext);
      word-break: break-all;
    }

    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--subtext);
      background: #fff;
      border-radius: 22px;
      border: 1px solid rgba(17, 24, 39, 0.06);
      box-shadow: var(--shadow);
    }

    @media (max-width: 860px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="index.html">← 返回首页</a>

    <section class="hero">
      <div class="hero-tag" id="heroTag">专题内容</div>
      <h1 id="pageTitle">加载中...</h1>
      <div class="desc" id="pageDesc">正在读取图片内容...</div>
    </section>

    <section class="gallery" id="gallery"></section>
  </div>

  <script>
    const OWNER = "Charles431";
    const REPO = "Marketing-Planning-Studies";
    const BRANCH = "main";
    const BASE_PATH = "/Marketing-Planning-Studies/";

    const TOPIC_CONFIG = {
      case: {
        title: "案例专题",
        desc: "聚焦品牌、活动、增长与业务案例的系统化沉淀。",
        folder: "images/case"
      },
      insight: {
        title: "营销洞见",
        desc: "聚焦行业变化、品牌传播与营销趋势的持续观察。",
        folder: "images/insight"
      },
      planning: {
        title: "策划研析",
        desc: "围绕策划方法、提案逻辑与项目复盘进行系统化拆解。",
        folder: "images/planning"
      },
      customer: {
        title: "客户攻略",
        desc: "聚焦客户分层、销售路径与客户经营的实战方法。",
        folder: "images/customer"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const topic = params.get("topic") || "case";
    const config = TOPIC_CONFIG[topic];

    const pageTitle = document.getElementById("pageTitle");
    const pageDesc = document.getElementById("pageDesc");
    const heroTag = document.getElementById("heroTag");
    const gallery = document.getElementById("gallery");

    if (!config) {
      pageTitle.textContent = "专题不存在";
      pageDesc.textContent = "请返回首页重新选择。";
      gallery.innerHTML = '<div class="empty">未找到对应专题。</div>';
    } else {
      pageTitle.textContent = config.title;
      pageDesc.textContent = config.desc;
      heroTag.textContent = config.title;

      const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${config.folder}?ref=${BRANCH}`;

      fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
          const images = (Array.isArray(data) ? data : [])
            .filter(item => item.type === "file" && /\.(jpg|jpeg|png|webp|gif)$/i.test(item.name))
            .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

          if (!images.length) {
            gallery.innerHTML = '<div class="empty">该专题下还没有图片，请先上传到对应文件夹。</div>';
            return;
          }

          gallery.innerHTML = images.map(item => {
            const imgUrl = `${BASE_PATH}${item.path}`;
            const cleanName = item.name.replace(/\.[^/.]+$/, "");
            return `
              <div class="item">
                <img src="${imgUrl}" alt="${cleanName}">
                <div class="item-body">
                  <div class="item-title">${cleanName}</div>
                  <div class="item-sub">${item.name}</div>
                </div>
              </div>
            `;
          }).join("");
        })
        .catch(() => {
          gallery.innerHTML = '<div class="empty">图片读取失败，请检查仓库名、分支名、文件夹路径是否正确。</div>';
        });
    }
  </script>
</body>
</html>
