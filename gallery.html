<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>专题图库</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #111827;
      --subtext: #6b7280;
      --line: #e5e7eb;
      --accent: #ff6600;
      --accent-light: #fff3eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-hover: 0 16px 40px rgba(15, 23, 42, 0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #fff7f2 0%, transparent 30%),
        radial-gradient(circle at top right, #f3f6ff 0%, transparent 35%),
        var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--accent);
      background: #fff;
      border: 1px solid rgba(255, 102, 0, 0.18);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .back:hover {
      background: var(--accent-light);
    }

    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #fff9f5 100%);
      border: 1px solid rgba(255, 102, 0, 0.10);
      border-radius: 28px;
      padding: 28px 24px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .hero-top {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 15px;
      color: var(--subtext);
      line-height: 1.7;
    }

    .status {
      margin: 18px 0 16px;
      color: var(--subtext);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      align-items: start;
    }

    .image-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(17, 24, 39, 0.06);
      box-shadow: var(--shadow);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .image-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(255, 102, 0, 0.22);
    }

    .image-wrap {
      display: block;
      background: #fff;
      text-decoration: none;
    }

    .image-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .image-info {
      padding: 14px 14px 16px;
      border-top: 1px solid rgba(17, 24, 39, 0.06);
    }

    .image-title {
      margin: 0 0 6px;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      line-height: 1.5;
      word-break: break-all;
    }

    .image-note {
      margin: 0;
      font-size: 12px;
      color: #9ca3af;
    }

    .empty {
      background: #fff;
      border: 1px dashed #d1d5db;
      border-radius: 20px;
      padding: 34px 24px;
      color: var(--subtext);
      line-height: 1.8;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .error {
      background: #fff7f7;
      border: 1px solid #fecaca;
      color: #991b1b;
      border-radius: 20px;
      padding: 22px;
      line-height: 1.8;
    }

    .footer {
      margin-top: 32px;
      padding-top: 18px;
      border-top: 1px solid rgba(17, 24, 39, 0.06);
      color: #9ca3af;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 18px 14px 36px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero {
        padding: 22px 18px 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 26px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="topbar">
      <a class="back" href="index.html">← 返回首页</a>
    </div>

    <section class="hero">
      <div class="hero-top" id="topicBadge">专题图库</div>
      <h1 id="topicTitle">专题图库</h1>
      <div class="subtitle" id="topicDesc">
        页面会自动读取当前专题文件夹中的图片，并按图片文件名顺序展示。
      </div>
    </section>

    <div class="status" id="status">正在读取图片...</div>

    <section class="grid" id="gallery"></section>

    <div class="footer">
      Marketing-Planning-Studies · GitHub Pages
    </div>

  </div>

  <script>
    const OWNER = "Charles431";
    const REPO = "Marketing-Planning-Studies";
    const BRANCH = "main";

    const topicMap = {
      case: {
        title: "案例专题",
        badge: "案例沉淀",
        desc: "市场研报 / 同业数据分析 / 实战案例拆解",
        folder: "case"
      },
      marketing: {
        title: "市场专题",
        badge: "市场观察",
        desc: "行业趋势 / 用户洞察 / 品牌认知 / 营销理论",
        folder: "marketing"
      },
      planning: {
        title: "策划专题",
        badge: "策划研析",
        desc: "方案拆解 / 逻辑剖析 / 提案结构 / 项目复盘",
        folder: "planning"
      },
      customer: {
        title: "客户专题",
        badge: "客户攻略",
        desc: "垂直客群 / 销售打法 / 全链路经营策略",
        folder: "customer"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const topic = params.get("topic") || "case";
    const config = topicMap[topic] || topicMap.case;

    document.title = config.title + " - 营销策划学习";
    document.getElementById("topicTitle").textContent = config.title;
    document.getElementById("topicBadge").textContent = config.badge;
    document.getElementById("topicDesc").textContent = config.desc;

    const statusEl = document.getElementById("status");
    const galleryEl = document.getElementById("gallery");

    const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/images/${config.folder}?ref=${BRANCH}`;

    const imageExtReg = /\.(jpg|jpeg|png|webp|gif)$/i;

    function cleanFileName(name) {
      return name
        .replace(/\.(jpg|jpeg|png|webp|gif)$/i, "")
        .replace(/[-_]/g, " ")
        .trim();
    }

    async function loadImages() {
      try {
        const res = await fetch(apiUrl);

        if (!res.ok) {
          throw new Error("读取失败");
        }

        const files = await res.json();

        const images = files
          .filter(file => file.type === "file" && imageExtReg.test(file.name))
          .sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));

        if (images.length === 0) {
          statusEl.textContent = "";
          galleryEl.className = "";
          galleryEl.innerHTML = `
            <div class="empty">
              当前专题文件夹暂无图片。<br>
              请把图片上传到：<strong>images/${config.folder}</strong>
            </div>
          `;
          return;
        }

        statusEl.textContent = `共读取到 ${images.length} 张图片`;

        galleryEl.innerHTML = images.map((img, index) => {
          const title = cleanFileName(img.name);
          const imageUrl = img.download_url;

          return `
            <article class="image-card">
              <a class="image-wrap" href="${imageUrl}" target="_blank" rel="noopener">
                <img src="${imageUrl}" alt="${title}" loading="lazy">
              </a>
              <div class="image-info">
                <h2 class="image-title">${String(index + 1).padStart(2, "0")} · ${title}</h2>
                <p class="image-note">点击图片查看原图</p>
              </div>
            </article>
          `;
        }).join("");

      } catch (error) {
        statusEl.textContent = "";
        galleryEl.className = "";
        galleryEl.innerHTML = `
          <div class="error">
            图片读取失败。请检查：<br>
            1. 仓库是否为公开仓库；<br>
            2. 是否存在 <strong>images/${config.folder}</strong> 文件夹；<br>
            3. 文件夹内是否上传了 jpg、jpeg、png、webp 或 gif 图片；<br>
            4. OWNER / REPO / BRANCH 是否填写正确。
          </div>
        `;
      }
    }

    loadImages();
  </script>
</body>
</html>
